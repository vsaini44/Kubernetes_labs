apiVersion: v1
kind: Pod 

metadata:
  name: pod1

spec:
  volumes:
    - name: vol1 
      emptyDir: {}

  containers:
    - name: cont1
      image: nginx
      imagePullPolicy: IfNotPresent
      volumeMounts:
        - name: vol1
          mountPath: /cont1data

    - name: cont2 
      image: memcached
      imagePullPolicy: IfNotPresent
      volumeMounts:
        - name: vol1
          mountPath: /cont2data
