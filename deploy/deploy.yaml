apiVersion: apps/v1
kind: Deployment

metadata:
  name: dep1

spec:
  replicas: 2
  selector:
    matchLabels:
      app: web

  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: cont1
        image: nginx
        ports:
        - containerPort: 80
        imagePullPolicy: IfNotPresent
